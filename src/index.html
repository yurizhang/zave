<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>文件管理器</title>
<style>
  :root { --bg:#1e1e2e; --panel:#27293d; --fg:#cdd6f4; --muted:#9399b2; --accent:#89b4fa; --hover:#313244; --sel:#3a4a6b; --danger:#f38ba8; }
  * { box-sizing: border-box; }
  body { margin:0; font-family:-apple-system,"PingFang SC",system-ui,sans-serif; background:var(--bg); color:var(--fg); }
  header { position:sticky; top:0; background:var(--panel); padding:10px 14px; border-bottom:1px solid #00000040; }
  .pathbar { display:flex; gap:8px; align-items:center; }
  .pathbar input {
    flex:1; background:var(--bg); color:var(--fg); border:1px solid #45475a;
    border-radius:6px; padding:8px 10px; font-family:ui-monospace,Menlo,monospace; font-size:13px;
  }
  button {
    background:var(--accent); color:#11111b; border:none; border-radius:6px;
    padding:8px 12px; font-size:13px; font-weight:600; cursor:pointer; white-space:nowrap;
  }
  button.ghost { background:var(--hover); color:var(--fg); }
  button.danger { background:var(--danger); color:#11111b; }
  button:disabled { opacity:.4; cursor:not-allowed; }
  button:active:not(:disabled) { transform:translateY(1px); }
  .crumbs { margin-top:8px; font-size:12px; color:var(--muted); word-break:break-all; }
  .crumbs a { color:var(--accent); text-decoration:none; cursor:pointer; }
  .crumbs a:hover { text-decoration:underline; }
  .toolbar { margin-top:8px; display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
  .clip { font-size:12px; color:var(--muted); margin-left:6px; word-break:break-all; }
  .clip b { color:var(--accent); }
  ul { list-style:none; margin:0; padding:0; }
  li {
    display:flex; align-items:center; gap:10px; padding:8px 14px;
    border-bottom:1px solid #ffffff08; cursor:pointer; user-select:none;
  }
  li:hover { background:var(--hover); }
  li.selected { background:var(--sel); }
  li.cut { opacity:.5; }
  .icon { width:20px; text-align:center; }
  .name { flex:1; word-break:break-all; }
  .size { color:var(--muted); font-size:12px; font-variant-numeric:tabular-nums; }
  .copy { opacity:0; font-size:11px; padding:4px 8px; }
  li:hover .copy { opacity:1; }
  .toast {
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
    background:var(--accent); color:#11111b; padding:10px 18px; border-radius:8px;
    font-weight:600; opacity:0; transition:opacity .2s; pointer-events:none; max-width:80%;
  }
  .toast.show { opacity:1; }
  .toast.bad { background:var(--danger); }
  .err { color:var(--danger); padding:14px; }
  .hint { color:var(--muted); font-size:11px; padding:6px 14px; }
</style>
</head>
<body>
<header>
  <div class="pathbar">
    <button class="ghost" id="up" title="上一级">⬆</button>
    <input id="path" spellcheck="false" />
    <button id="go">跳转</button>
    <button class="ghost" id="copyPath" title="复制当前完整路径">复制路径</button>
  </div>
  <div class="crumbs" id="crumbs"></div>
  <div class="toolbar">
    <button class="ghost" id="cut" disabled>剪切</button>
    <button class="ghost" id="copy" disabled>复制</button>
    <button id="paste" disabled>粘贴</button>
    <button class="danger" id="del" disabled>删除</button>
    <span class="clip" id="clip"></span>
  </div>
</header>
<div class="hint">单击选中 · 双击文件夹进入 · 选中后用上方按钮剪切/复制/删除</div>
<ul id="list"></ul>
<div class="toast" id="toast"></div>

<script>
const $ = (s) => document.querySelector(s);
let current = "";          // 当前目录绝对路径
let entries = [];          // 当前目录条目
let selected = null;       // 选中项 { name, kind, path }
let clipboard = null;      // { path, name, op:'cut'|'copy' }

function join(dir, name) {
  return (dir.endsWith("/") ? dir : dir + "/") + name;
}
function fmtSize(n, kind) {
  if (kind === "directory") return "";
  if (n < 1024) return n + " B";
  if (n < 1024*1024) return (n/1024).toFixed(1) + " KB";
  if (n < 1024*1024*1024) return (n/1024/1024).toFixed(1) + " MB";
  return (n/1024/1024/1024).toFixed(2) + " GB";
}
const iconFor = (kind) => kind === "directory" ? "📁" : "📄";

function toast(msg, bad) {
  const t = $("#toast");
  t.textContent = msg;
  t.className = "toast show" + (bad ? " bad" : "");
  setTimeout(() => t.className = "toast", 1600);
}
async function copyText(text) {
  try { await navigator.clipboard.writeText(text); toast("已复制: " + text); }
  catch { toast("复制失败", true); }
}

function renderCrumbs(path) {
  const c = $("#crumbs");
  c.innerHTML = "";
  const root = document.createElement("a");
  root.textContent = "/"; root.onclick = () => load("/");
  c.appendChild(root);
  let acc = "";
  const parts = path.split("/").filter(Boolean);
  parts.forEach((p, i) => {
    acc += "/" + p;
    const a = document.createElement("a");
    a.textContent = p; const full = acc;
    a.onclick = () => load(full);
    c.appendChild(a);
    if (i < parts.length - 1) c.appendChild(document.createTextNode(" / "));
  });
}

function updateButtons() {
  $("#cut").disabled = !selected;
  $("#copy").disabled = !selected;
  $("#del").disabled = !selected;
  $("#paste").disabled = !clipboard;
  const c = $("#clip");
  if (clipboard) {
    c.innerHTML = (clipboard.op === "cut" ? "✂️ 待移动: " : "📋 待复制: ") + "<b>" + clipboard.name + "</b>";
  } else c.textContent = "";
}

function select(entry, li) {
  selected = { name: entry.name, kind: entry.kind, path: join(current, entry.name) };
  document.querySelectorAll("#list li").forEach(el => el.classList.remove("selected"));
  li.classList.add("selected");
  updateButtons();
}

function render() {
  const ul = $("#list");
  ul.innerHTML = "";
  entries.sort((a, b) => {
    if (a.kind !== b.kind) return a.kind === "directory" ? -1 : 1;
    return a.name.localeCompare(b.name);
  });
  for (const e of entries) {
    const li = document.createElement("li");
    const full = join(current, e.name);
    if (clipboard && clipboard.op === "cut" && clipboard.path === full) li.classList.add("cut");
    li.innerHTML =
      '<span class="icon">' + iconFor(e.kind) + '</span>' +
      '<span class="name"></span>' +
      '<span class="size">' + fmtSize(e.size, e.kind) + '</span>' +
      '<button class="copy ghost">复制路径</button>';
    li.querySelector(".name").textContent = e.name;
    li.querySelector(".copy").onclick = (ev) => { ev.stopPropagation(); copyText(full); };
    li.onclick = () => select(e, li);
    li.ondblclick = () => { if (e.kind === "directory") load(full); else copyText(full); };
    ul.appendChild(li);
  }
}

async function load(path) {
  try {
    const res = await fetch("/api/list?path=" + encodeURIComponent(path));
    const data = await res.json();
    if (data.error) { $("#list").innerHTML = '<div class="err">' + data.error + '</div>'; return; }
    current = data.path;
    entries = data.entries;
    selected = null;
    $("#path").value = data.path;
    renderCrumbs(data.path);
    render();
    updateButtons();
  } catch (err) {
    $("#list").innerHTML = '<div class="err">加载失败: ' + err + '</div>';
  }
}

function parentOf(path) {
  if (path === "/" || path === "") return path;
  const trimmed = path.replace(/\/+$/, "");
  const idx = trimmed.lastIndexOf("/");
  return idx <= 0 ? "/" : trimmed.slice(0, idx);
}

async function doPaste() {
  if (!clipboard) return;
  const dest = join(current, clipboard.name);
  if (dest === clipboard.path) { toast("源和目标相同", true); return; }
  const api = clipboard.op === "cut" ? "/api/move" : "/api/copy";
  try {
    const res = await fetch(api + "?from=" + encodeURIComponent(clipboard.path) + "&to=" + encodeURIComponent(dest), { method: "POST" });
    const data = await res.json();
    if (data.error) { toast("操作失败: " + data.error, true); return; }
    toast(clipboard.op === "cut" ? "已移动" : "已复制");
    if (clipboard.op === "cut") clipboard = null;
    load(current);
  } catch (err) { toast("请求失败: " + err, true); }
}

async function doDelete() {
  if (!selected) return;
  if (!confirm("确定删除?\n\n" + selected.path + (selected.kind === "directory" ? "\n\n(整个文件夹及其内容)" : ""))) return;
  try {
    const res = await fetch("/api/delete?path=" + encodeURIComponent(selected.path), { method: "POST" });
    const data = await res.json();
    if (data.error) { toast("删除失败: " + data.error, true); return; }
    toast("已删除");
    if (clipboard && clipboard.path === selected.path) clipboard = null;
    load(current);
  } catch (err) { toast("请求失败: " + err, true); }
}

$("#up").onclick = () => load(parentOf(current));
$("#go").onclick = () => load($("#path").value);
$("#path").addEventListener("keydown", (e) => { if (e.key === "Enter") load($("#path").value); });
$("#copyPath").onclick = () => copyText(current);
$("#cut").onclick = () => { if (selected) { clipboard = { ...selected, op: "cut" }; updateButtons(); render(); toast("已剪切"); } };
$("#copy").onclick = () => { if (selected) { clipboard = { ...selected, op: "copy" }; updateButtons(); toast("已复制"); } };
$("#paste").onclick = doPaste;
$("#del").onclick = doDelete;

// 键盘快捷键(像 Windows)
document.addEventListener("keydown", (e) => {
  if (e.target.tagName === "INPUT") return;
  if ((e.metaKey || e.ctrlKey) && e.key === "x" && selected) { e.preventDefault(); $("#cut").click(); }
  else if ((e.metaKey || e.ctrlKey) && e.key === "c" && selected) { e.preventDefault(); $("#copy").click(); }
  else if ((e.metaKey || e.ctrlKey) && e.key === "v" && clipboard) { e.preventDefault(); doPaste(); }
  else if ((e.key === "Delete" || e.key === "Backspace") && selected) { e.preventDefault(); doDelete(); }
});

load("");
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文件管理器</title>
<link rel="stylesheet" href="/assets/tabler-icons.min.css">
<style>
:root{
  --bg:#eaeaea; --win:#f9f9f9; --content:#ffffff; --side:#f3f3f3;
  --text:#1b1b1b; --muted:#5f5f5f; --faint:#909090;
  --accent:#0067c0; --accent-soft:#e8f1fb; --accent-line:#0067c0;
  --border:#e3e3e3; --border-strong:#d2d2d2; --hover:#ececec;
  --folder:#e0a93a; --doc:#2b6cb0; --xls:#1f7a45; --img:#c2820a; --pdf:#c0392b; --aud:#7048b6; --zip:#6b7280;
  --green:#1f7a45; --shadow:rgba(0,0,0,.18);
}
.dark{
  --bg:#1a1a1a; --win:#202020; --content:#272727; --side:#242424;
  --text:#f3f3f3; --muted:#a6a6a6; --faint:#7a7a7a;
  --accent:#4cc2ff; --accent-soft:#0e3a5f; --accent-line:#4cc2ff;
  --border:#393939; --border-strong:#454545; --hover:#323232;
  --folder:#e7b85a; --doc:#5aa9e6; --xls:#4cc38a; --img:#e0b341; --pdf:#e57373; --aud:#a78bfa; --zip:#9ca3af;
  --green:#4cc38a; --shadow:rgba(0,0,0,.5);
}
*{box-sizing:border-box;font-family:"Segoe UI","Microsoft YaHei","PingFang SC",system-ui,-apple-system,sans-serif}
html,body{margin:0;height:100%}
body{background:var(--win);color:var(--text)}
.win{width:100%;height:100vh;background:var(--win);display:flex;flex-direction:column;overflow:hidden}

.titlebar{display:flex;align-items:center;height:44px;padding-left:10px;gap:3px;background:var(--win);flex:0 0 auto}
.tab{display:flex;align-items:center;gap:9px;height:34px;padding:0 14px;font-size:13px;color:var(--text);border-radius:9px 9px 0 0;cursor:default;user-select:none;background:var(--content);font-weight:600;max-width:240px}
.tab .ti{font-size:17px}
.tab .nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.spacer{flex:1}
.wbtn{display:flex;align-items:center;justify-content:center;width:46px;height:44px;color:var(--muted);cursor:pointer}
.wbtn:hover{background:var(--hover)}

.cmdbar{display:flex;align-items:center;gap:3px;height:48px;padding:0 12px;background:var(--content);border-bottom:1px solid var(--border);flex:0 0 auto}
.cmd{display:flex;align-items:center;gap:7px;height:34px;padding:0 12px;font-size:13px;color:var(--text);border-radius:7px;cursor:pointer;user-select:none}
.cmd:hover{background:var(--hover)}
.cmd .ti{font-size:17px}
.cmd.primary{background:var(--accent-soft);color:var(--accent)}
.cmd.on{background:var(--accent-soft);color:var(--accent)}
.iconbtn{display:flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:7px;color:var(--text);cursor:pointer}
.iconbtn:hover{background:var(--hover)}
.iconbtn.disabled{color:var(--faint);cursor:default}
.iconbtn.disabled:hover{background:transparent}
.iconbtn .ti{font-size:18px}
.sep{width:1px;height:22px;background:var(--border-strong);margin:0 6px}

.addrbar{display:flex;align-items:center;gap:8px;height:50px;padding:0 14px;background:var(--content);border-bottom:1px solid var(--border);flex:0 0 auto}
.navbtn{display:flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:7px;color:var(--muted);cursor:pointer}
.navbtn:hover{background:var(--hover)}
.navbtn.disabled{color:var(--faint);cursor:default}
.navbtn.disabled:hover{background:transparent}
.address{flex:1;display:flex;align-items:center;gap:5px;height:36px;padding:0 12px;border:1px solid var(--border-strong);border-radius:7px;font-size:13px;min-width:0;background:var(--content);overflow:hidden}
.crumb{color:var(--muted);cursor:pointer;padding:3px 6px;border-radius:5px;white-space:nowrap}
.crumb:hover{background:var(--hover);color:var(--text)}
.crumb.cur{color:var(--text);font-weight:600}
.search{display:flex;align-items:center;gap:8px;width:230px;height:36px;padding:0 12px;border:1px solid var(--border-strong);border-radius:7px;font-size:13px;color:var(--faint)}
.search input{border:0;outline:0;background:transparent;font-size:13px;color:var(--text);width:100%}
.search input::placeholder{color:var(--faint)}

.body{display:grid;grid-template-columns:230px minmax(0,1fr) 260px;flex:1 1 auto;min-height:0;background:var(--content)}
.side{background:var(--side);border-right:1px solid var(--border);padding:10px 8px;overflow:auto}
.snode{position:relative;display:flex;align-items:center;gap:9px;height:34px;padding:0 10px;font-size:13px;color:var(--text);border-radius:7px;cursor:pointer;user-select:none}
.snode:hover{background:var(--hover)}
.snode.active{background:var(--accent-soft);font-weight:600}
.snode.active::before{content:"";position:absolute;left:4px;width:3px;height:16px;background:var(--accent-line);border-radius:3px}
.snode .lead{font-size:18px;color:var(--accent)}
.children{padding-left:16px}
.children .snode .lead{font-size:16px}
.sectlabel{font-size:11px;color:var(--faint);padding:10px 12px 4px;letter-spacing:.3px}

.main{padding:8px 10px;overflow:auto;display:flex;flex-direction:column}
.listhead{display:grid;grid-template-columns:1fr 150px 130px 90px;align-items:center;height:30px;padding:0 12px;font-size:12px;color:var(--muted);border-bottom:1px solid var(--border);flex:0 0 auto}
.listhead span{display:flex;align-items:center;gap:4px;cursor:pointer}
.listhead span:hover{color:var(--text)}
.row{display:grid;grid-template-columns:1fr 150px 130px 90px;align-items:center;height:38px;padding:0 12px;font-size:13px;border-radius:7px;cursor:pointer;user-select:none}
.row:hover{background:var(--hover)}
.row.sel{background:var(--accent-soft)}
.row.cut{opacity:.5}
.row .nm{display:flex;align-items:center;gap:11px;min-width:0}
.row .nm .ti{font-size:19px}
.row .nm span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.row .c{color:var(--muted);font-size:12px}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(112px,1fr));gap:6px;padding:10px 4px;align-content:start}
.cell{display:flex;flex-direction:column;align-items:center;gap:9px;padding:16px 8px;border-radius:9px;cursor:pointer;user-select:none}
.cell:hover{background:var(--hover)}
.cell.sel{background:var(--accent-soft)}
.cell.cut{opacity:.5}
.cell .ti{font-size:46px}
.cell .label{font-size:12px;text-align:center;line-height:1.3;max-width:100%;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;line-clamp:2;-webkit-box-orient:vertical}

.details{border-left:1px solid var(--border);padding:18px 16px;overflow:auto;background:var(--content)}
.preview{height:140px;border-radius:9px;background:var(--side);display:flex;align-items:center;justify-content:center;margin-bottom:14px}
.preview .ti{font-size:62px}
.dname{font-size:15px;font-weight:600;margin-bottom:2px;word-break:break-word}
.dtype{font-size:12px;color:var(--muted);margin-bottom:16px}
.drow{display:flex;justify-content:space-between;gap:10px;font-size:12px;padding:7px 0;border-top:1px solid var(--border)}
.drow .k{color:var(--muted);flex:0 0 auto}
.drow .v{text-align:right;word-break:break-all}
.dempty{color:var(--faint);font-size:12px;text-align:center;margin-top:40px}

.statusbar{display:flex;align-items:center;gap:18px;height:30px;padding:0 16px;background:var(--win);border-top:1px solid var(--border);font-size:12px;color:var(--muted);flex:0 0 auto}
.viewtoggle{display:flex;gap:2px}
.vbtn{display:flex;align-items:center;justify-content:center;width:30px;height:24px;border-radius:6px;color:var(--muted);cursor:pointer}
.vbtn:hover{background:var(--hover)}
.vbtn.active{background:var(--accent-soft);color:var(--accent)}
.hidden{display:none!important}
.empty{color:var(--faint);padding:30px;font-size:13px;text-align:center}
.toast{position:fixed;bottom:46px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:600;opacity:0;transition:opacity .2s;pointer-events:none;max-width:80%;box-shadow:0 6px 20px var(--shadow);z-index:9}
.toast.show{opacity:1}
.toast.bad{background:var(--pdf)}
</style>
</head>
<body>
<div class="win">

  <div class="titlebar">
    <div class="tab"><i class="ti ti-folder"></i><span class="nm" id="tabName">文件管理器</span></div>
    <div class="spacer"></div>
    <div class="wbtn" id="themeBtn" title="切换深色 / 浅色"><i class="ti ti-moon"></i></div>
  </div>

  <div class="cmdbar">
    <div class="cmd primary" id="mkdirBtn"><i class="ti ti-plus"></i>新建文件夹</div>
    <div class="sep"></div>
    <div class="iconbtn" id="cutBtn" title="剪切 (Ctrl/Cmd+X)"><i class="ti ti-scissors"></i></div>
    <div class="iconbtn" id="copyBtn" title="复制 (Ctrl/Cmd+C)"><i class="ti ti-copy"></i></div>
    <div class="iconbtn" id="pasteBtn" title="粘贴 (Ctrl/Cmd+V)"><i class="ti ti-clipboard"></i></div>
    <div class="iconbtn" id="renameBtn" title="重命名 (F2)"><i class="ti ti-pencil"></i></div>
    <div class="iconbtn" id="shareBtn" title="复制完整路径"><i class="ti ti-share"></i></div>
    <div class="iconbtn" id="delBtn" title="删除 (Delete)"><i class="ti ti-trash"></i></div>
    <div class="sep"></div>
    <div class="cmd" id="sortBtn"><i class="ti ti-arrows-sort"></i>排序</div>
    <div class="cmd" id="viewMenu"><i class="ti ti-layout-grid"></i>查看</div>
    <div class="cmd" id="hiddenBtn"><i class="ti ti-eye"></i>显示隐藏</div>
  </div>

  <div class="addrbar">
    <div class="navbtn" id="backBtn" title="后退"><i class="ti ti-arrow-left"></i></div>
    <div class="navbtn" id="fwdBtn" title="前进"><i class="ti ti-arrow-right"></i></div>
    <div class="navbtn" id="upBtn" title="向上"><i class="ti ti-arrow-up"></i></div>
    <div class="navbtn" id="refreshBtn" title="刷新"><i class="ti ti-refresh" style="font-size:17px"></i></div>
    <div class="address" id="crumbs"></div>
    <div class="search"><i class="ti ti-search" style="font-size:16px"></i><input id="filter" placeholder="搜索"></div>
  </div>

  <div class="body">
    <nav class="side" id="side"></nav>
    <section class="main">
      <div class="listhead" id="listhead">
        <span data-sort="name">名称 <i class="ti" id="sortArrow"></i></span>
        <span data-sort="mtime">修改日期</span><span data-sort="type">类型</span><span data-sort="size">大小</span>
      </div>
      <div id="listView"></div>
      <div id="gridView" class="grid hidden"></div>
    </section>
    <aside class="details" id="details"></aside>
  </div>

  <div class="statusbar">
    <span id="count"></span>
    <span id="selinfo"></span>
    <div class="spacer"></div>
    <div class="viewtoggle">
      <div class="vbtn active" data-view="list" title="详细列表"><i class="ti ti-layout-list"></i></div>
      <div class="vbtn" data-view="grid" title="大图标"><i class="ti ti-layout-grid"></i></div>
    </div>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
const $ = (s) => document.querySelector(s);

// ───────── 状态 ─────────
let current = "";
let home = "";
let entries = [];
let selName = null;
let clipboard = null;        // { path, name, op }
let view = "list";
let showHidden = false;
let filterText = "";
let sortKey = "name", sortAsc = true;
let hist = [], histIdx = -1;  // 历史栈

// ───────── 工具 ─────────
const join = (dir, name) => (dir.endsWith("/") ? dir : dir + "/") + name;
function basename(p){ if(p==="/"||p==="") return p; const t=p.replace(/\/+$/,""); return t.slice(t.lastIndexOf("/")+1); }
function parentOf(p){ if(p==="/"||p==="") return p; const t=p.replace(/\/+$/,""); const i=t.lastIndexOf("/"); return i<=0?"/":t.slice(0,i); }

function fmtSize(n, isDir){
  if(isDir) return "";
  if(n<1024) return n+" B";
  if(n<1048576) return (n/1024).toFixed(0)+" KB";
  if(n<1073741824) return (n/1048576).toFixed(1)+" MB";
  return (n/1073741824).toFixed(2)+" GB";
}
function fmtDate(ms){
  if(!ms) return "—";
  const d=new Date(ms); const p=(x)=>String(x).padStart(2,"0");
  return `${d.getFullYear()}/${p(d.getMonth()+1)}/${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
}
function ext(name){ const i=name.lastIndexOf("."); return i<=0?"":name.slice(i+1).toLowerCase(); }

const TYPE_MAP = {
  doc:["ti-file-text","--doc","Word 文档"], docx:["ti-file-text","--doc","Word 文档"],
  xls:["ti-file-spreadsheet","--xls","Excel 工作表"], xlsx:["ti-file-spreadsheet","--xls","Excel 工作表"], csv:["ti-file-spreadsheet","--xls","CSV 文件"],
  ppt:["ti-file-text","--doc","PowerPoint 演示"], pptx:["ti-file-text","--doc","PowerPoint 演示"],
  pdf:["ti-file-typography","--pdf","PDF 文档"],
  png:["ti-photo","--img","PNG 图像"], jpg:["ti-photo","--img","JPEG 图像"], jpeg:["ti-photo","--img","JPEG 图像"],
  gif:["ti-photo","--img","GIF 图像"], webp:["ti-photo","--img","WebP 图像"], svg:["ti-photo","--img","SVG 图像"], bmp:["ti-photo","--img","位图图像"], heic:["ti-photo","--img","HEIC 图像"],
  zip:["ti-file-zip","--zip","压缩文件夹"], tar:["ti-file-zip","--zip","归档文件"], gz:["ti-file-zip","--zip","压缩文件"], rar:["ti-file-zip","--zip","压缩文件"], "7z":["ti-file-zip","--zip","压缩文件"],
  mp3:["ti-music","--aud","音频文件"], m4a:["ti-music","--aud","音频文件"], wav:["ti-music","--aud","音频文件"], flac:["ti-music","--aud","音频文件"], aac:["ti-music","--aud","音频文件"],
  mp4:["ti-movie","--aud","视频文件"], mov:["ti-movie","--aud","视频文件"], mkv:["ti-movie","--aud","视频文件"], avi:["ti-movie","--aud","视频文件"], webm:["ti-movie","--aud","视频文件"],
  txt:["ti-file-text","--doc","文本文档"], md:["ti-file-text","--doc","Markdown 文档"],
  zig:["ti-file-code","--doc","Zig 源文件"], js:["ti-file-code","--doc","JavaScript 文件"], ts:["ti-file-code","--doc","TypeScript 文件"],
  html:["ti-file-code","--doc","HTML 文件"], css:["ti-file-code","--doc","CSS 文件"], json:["ti-file-code","--doc","JSON 文件"],
  py:["ti-file-code","--doc","Python 文件"], sh:["ti-file-code","--doc","Shell 脚本"], c:["ti-file-code","--doc","C 源文件"], rs:["ti-file-code","--doc","Rust 源文件"],
};
function meta(e){
  if(e.kind==="directory") return {ic:"ti-folder", col:"--folder", tl:"文件夹"};
  const m=TYPE_MAP[ext(e.name)];
  if(m) return {ic:m[0], col:m[1], tl:m[2]};
  const ex=ext(e.name);
  return {ic:"ti-file", col:"--faint", tl: ex ? ex.toUpperCase()+" 文件" : "文件"};
}

function toast(msg, bad){
  const t=$("#toast"); t.textContent=msg; t.className="toast show"+(bad?" bad":"");
  setTimeout(()=>t.className="toast",1600);
}
async function copyText(text){
  try{ await navigator.clipboard.writeText(text); toast("已复制路径: "+text); }
  catch{ toast("复制失败",true); }
}

// ───────── 侧边栏 ─────────
function buildSide(){
  const places=[
    {label:"主页", icon:"ti-home", path:home, col:"--accent"},
    {label:"图片", icon:"ti-photo", path:join(home,"Pictures"), col:"--accent"},
    {sect:"位置"},
    {label:"桌面", icon:"ti-device-imac", path:join(home,"Desktop"), col:"--accent"},
    {label:"文稿", icon:"ti-folder", path:join(home,"Documents"), col:"--folder"},
    {label:"下载", icon:"ti-download", path:join(home,"Downloads"), col:"--accent"},
    {label:"音乐", icon:"ti-music", path:join(home,"Music"), col:"--accent"},
    {label:"影片", icon:"ti-movie", path:join(home,"Movies"), col:"--accent"},
    {label:"应用程序", icon:"ti-apps", path:"/Applications", col:"--accent"},
    {label:"磁盘根目录", icon:"ti-database", path:"/", col:"--accent"},
  ];
  const side=$("#side"); side.innerHTML="";
  for(const p of places){
    if(p.sect){ const s=document.createElement("div"); s.className="sectlabel"; s.textContent=p.sect; side.appendChild(s); continue; }
    const n=document.createElement("div");
    n.className="snode"+(current===p.path?" active":"");
    n.innerHTML=`<i class="ti ${p.icon} lead" style="color:var(${p.col})"></i>${p.label}`;
    n.onclick=()=>load(p.path);
    side.appendChild(n);
  }
}

// ───────── 面包屑 ─────────
function buildCrumbs(){
  const c=$("#crumbs"); c.innerHTML="";
  const mk=(label,path,cur,icon)=>{
    const s=document.createElement("span"); s.className="crumb"+(cur?" cur":"");
    s.innerHTML=(icon?`<i class="ti ${icon}" style="font-size:15px;margin-right:4px;color:var(--muted)"></i>`:"")+label;
    s.onclick=()=>load(path); return s;
  };
  const chev=()=>{ const i=document.createElement("i"); i.className="ti ti-chevron-right"; i.style.cssText="color:var(--faint);font-size:13px"; return i; };
  const parts=current.split("/").filter(Boolean);
  c.appendChild(mk("此电脑","/",parts.length===0,"ti-device-desktop"));
  let acc="";
  parts.forEach((p,i)=>{ acc+="/"+p; c.appendChild(chev()); c.appendChild(mk(p,acc,i===parts.length-1)); });
}

// ───────── 过滤 + 排序 ─────────
function visible(){
  const q=filterText.trim().toLowerCase();
  let list=entries.filter(e=>{
    if(!showHidden && e.name.startsWith(".")) return false;
    if(q && !e.name.toLowerCase().includes(q)) return false;
    return true;
  });
  list.sort((a,b)=>{
    if(a.kind!==b.kind) return a.kind==="directory"?-1:1; // 目录永远在前
    let r=0;
    if(sortKey==="name") r=a.name.localeCompare(b.name);
    else if(sortKey==="size") r=a.size-b.size;
    else if(sortKey==="mtime") r=a.mtime-b.mtime;
    else if(sortKey==="type") r=meta(a).tl.localeCompare(meta(b).tl)||a.name.localeCompare(b.name);
    return sortAsc?r:-r;
  });
  return list;
}

// ───────── 渲染 ─────────
function render(){
  const list=visible();
  const lv=$("#listView"), gv=$("#gridView");
  if(list.length===0){
    const msg=filterText?"没有匹配的文件":"(空目录)";
    lv.innerHTML=`<div class="empty">${msg}</div>`; gv.innerHTML=`<div class="empty">${msg}</div>`;
  } else if(view==="list"){
    lv.innerHTML=list.map(e=>{
      const m=meta(e), full=join(current,e.name);
      const isCut=clipboard&&clipboard.op==="cut"&&clipboard.path===full;
      return `<div class="row ${e.name===selName?'sel':''} ${isCut?'cut':''}" data-n="${encodeURIComponent(e.name)}">
        <div class="nm"><i class="ti ${m.ic}" style="color:var(${m.col})"></i><span>${escapeHtml(e.name)}</span></div>
        <div class="c">${fmtDate(e.mtime)}</div><div class="c">${m.tl}</div><div class="c">${fmtSize(e.size,e.kind==='directory')||'—'}</div>
      </div>`;
    }).join("");
    bindRows(lv,".row");
  } else {
    gv.innerHTML=list.map(e=>{
      const m=meta(e), full=join(current,e.name);
      const isCut=clipboard&&clipboard.op==="cut"&&clipboard.path===full;
      return `<div class="cell ${e.name===selName?'sel':''} ${isCut?'cut':''}" data-n="${encodeURIComponent(e.name)}">
        <i class="ti ${m.ic}" style="color:var(${m.col})"></i><div class="label">${escapeHtml(e.name)}</div>
      </div>`;
    }).join("");
    bindRows(gv,".cell");
  }
  lv.classList.toggle("hidden",view!=="list");
  gv.classList.toggle("hidden",view!=="grid");
  $("#listhead").classList.toggle("hidden",view!=="list");
  $("#sortArrow").className="ti "+(sortKey==="name"?(sortAsc?"ti-chevron-up":"ti-chevron-down"):"");
  $("#count").textContent=list.length+" 个项目";
  $("#selinfo").textContent=selName?"已选择 1 项":"";
  renderDetails();
  updateButtons();
}
function escapeHtml(s){ return s.replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c])); }
function bindRows(container,sel){
  container.querySelectorAll(sel).forEach(el=>{
    const name=decodeURIComponent(el.dataset.n);
    const e=entries.find(x=>x.name===name);
    el.onclick=()=>{ selName=name; render(); };
    el.ondblclick=()=>{ if(e.kind==="directory") load(join(current,name)); else copyText(join(current,name)); };
  });
}
function renderDetails(){
  const d=$("#details");
  const e=entries.find(x=>x.name===selName);
  if(!e){ d.innerHTML=`<div class="dempty">未选择项目<br>单击文件或文件夹查看详情</div>`; return; }
  const m=meta(e);
  let rows=`<div class="drow"><span class="k">类型</span><span class="v">${m.tl}</span></div>`;
  rows+=`<div class="drow"><span class="k">修改日期</span><span class="v">${fmtDate(e.mtime)}</span></div>`;
  if(e.kind!=="directory") rows+=`<div class="drow"><span class="k">大小</span><span class="v">${fmtSize(e.size,false)}</span></div>`;
  rows+=`<div class="drow"><span class="k">完整路径</span><span class="v">${escapeHtml(join(current,e.name))}</span></div>`;
  d.innerHTML=`<div class="preview"><i class="ti ${m.ic}" style="color:var(${m.col})"></i></div>
    <div class="dname">${escapeHtml(e.name)}</div><div class="dtype">${m.tl}</div>${rows}`;
}
function updateButtons(){
  const has=!!selName;
  ["cutBtn","copyBtn","renameBtn","delBtn","shareBtn"].forEach(id=>$("#"+id).classList.toggle("disabled",!has));
  $("#pasteBtn").classList.toggle("disabled",!clipboard);
  $("#hiddenBtn").classList.toggle("on",showHidden);
}

// ───────── 加载 / 导航 ─────────
async function load(path, fromHist){
  try{
    const res=await fetch("/api/list?path="+encodeURIComponent(path));
    const data=await res.json();
    if(data.error){ toast("无法打开: "+data.error,true); return; }
    current=data.path; home=data.home||home; entries=data.entries;
    selName=null; filterText=""; $("#filter").value="";
    if(!fromHist){ hist=hist.slice(0,histIdx+1); hist.push(current); histIdx=hist.length-1; }
    $("#tabName").textContent=basename(current)||"/";
    $("#filter").placeholder="搜索 "+(basename(current)||"/");
    buildSide(); buildCrumbs(); render(); updateNav();
    $(".main").scrollTop=0;
  }catch(err){ toast("加载失败: "+err,true); }
}
function updateNav(){
  $("#backBtn").classList.toggle("disabled",histIdx<=0);
  $("#fwdBtn").classList.toggle("disabled",histIdx>=hist.length-1);
}

// ───────── POST 封装 ─────────
async function api(url, okMsg){
  try{
    const res=await fetch(url,{method:"POST"});
    const data=await res.json();
    if(data.error){ toast("失败: "+data.error,true); return false; }
    if(okMsg) toast(okMsg); return true;
  }catch(err){ toast("请求失败: "+err,true); return false; }
}

// ───────── 文件操作 ─────────
const selEntry=()=>entries.find(x=>x.name===selName);
async function doMkdir(){
  const name=prompt("新文件夹名称:","新建文件夹"); if(!name) return;
  if(await api("/api/mkdir?path="+encodeURIComponent(join(current,name)),"已创建")) load(current,true);
}
function doCut(){ const e=selEntry(); if(!e) return; clipboard={path:join(current,e.name),name:e.name,op:"cut"}; toast("已剪切"); render(); }
function doCopy(){ const e=selEntry(); if(!e) return; clipboard={path:join(current,e.name),name:e.name,op:"copy"}; toast("已复制"); render(); }
async function doPaste(){
  if(!clipboard) return;
  const dest=join(current,clipboard.name);
  if(dest===clipboard.path){ toast("源和目标相同",true); return; }
  const u=(clipboard.op==="cut"?"/api/move":"/api/copy")+"?from="+encodeURIComponent(clipboard.path)+"&to="+encodeURIComponent(dest);
  if(await api(u,clipboard.op==="cut"?"已移动":"已复制")){ if(clipboard.op==="cut") clipboard=null; load(current,true); }
}
async function doRename(){
  const e=selEntry(); if(!e) return;
  const name=prompt("重命名为:",e.name); if(!name||name===e.name) return;
  if(await api("/api/move?from="+encodeURIComponent(join(current,e.name))+"&to="+encodeURIComponent(join(current,name)),"已重命名")) load(current,true);
}
async function doDelete(){
  const e=selEntry(); if(!e) return;
  if(!confirm("确定删除?\n\n"+join(current,e.name)+(e.kind==="directory"?"\n\n(整个文件夹及其内容)":""))) return;
  const p=join(current,e.name);
  if(await api("/api/delete?path="+encodeURIComponent(p),"已删除")){ if(clipboard&&clipboard.path===p) clipboard=null; load(current,true); }
}

// ───────── 事件绑定 ─────────
$("#mkdirBtn").onclick=doMkdir;
$("#cutBtn").onclick=doCut;
$("#copyBtn").onclick=doCopy;
$("#pasteBtn").onclick=doPaste;
$("#renameBtn").onclick=doRename;
$("#delBtn").onclick=doDelete;
$("#shareBtn").onclick=()=>{ const e=selEntry(); if(e) copyText(join(current,e.name)); };

$("#backBtn").onclick=()=>{ if(histIdx>0){ histIdx--; load(hist[histIdx],true); } };
$("#fwdBtn").onclick=()=>{ if(histIdx<hist.length-1){ histIdx++; load(hist[histIdx],true); } };
$("#upBtn").onclick=()=>load(parentOf(current));
$("#refreshBtn").onclick=()=>load(current,true);

$("#filter").addEventListener("input",e=>{ filterText=e.target.value; render(); });
$("#hiddenBtn").onclick=()=>{ showHidden=!showHidden; render(); toast(showHidden?"显示隐藏文件":"隐藏隐藏文件"); };
$("#viewMenu").onclick=()=>setView(view==="list"?"grid":"list");
$("#sortBtn").onclick=()=>{ const keys=["name","mtime","type","size"]; sortKey=keys[(keys.indexOf(sortKey)+1)%keys.length]; render(); toast("按"+({name:"名称",mtime:"日期",type:"类型",size:"大小"}[sortKey])+"排序"); };

document.querySelectorAll(".listhead span").forEach(s=>s.onclick=()=>{
  const k=s.dataset.sort; if(k===sortKey) sortAsc=!sortAsc; else { sortKey=k; sortAsc=true; } render();
});
document.querySelectorAll(".vbtn").forEach(b=>b.onclick=()=>setView(b.dataset.view));
function setView(v){
  view=v;
  document.querySelectorAll(".vbtn").forEach(x=>x.classList.toggle("active",x.dataset.view===v));
  render();
}

// 主题
function applyTheme(dark){
  document.documentElement.classList.toggle("dark",dark);
  $("#themeBtn").querySelector("i").className="ti "+(dark?"ti-sun":"ti-moon");
  try{ localStorage.setItem("fm-theme",dark?"dark":"light"); }catch{}
}
$("#themeBtn").onclick=()=>applyTheme(!document.documentElement.classList.contains("dark"));
(function(){ let t="light"; try{ t=localStorage.getItem("fm-theme")||"light"; }catch{} applyTheme(t==="dark"); })();

// 键盘快捷键
document.addEventListener("keydown",e=>{
  if(e.target.tagName==="INPUT"){ if(e.key==="Escape"){ e.target.value=""; filterText=""; render(); e.target.blur(); } return; }
  const mod=e.metaKey||e.ctrlKey;
  if(mod&&e.key==="x"&&selName){ e.preventDefault(); doCut(); }
  else if(mod&&e.key==="c"&&selName){ e.preventDefault(); doCopy(); }
  else if(mod&&e.key==="v"&&clipboard){ e.preventDefault(); doPaste(); }
  else if(e.key==="F2"&&selName){ e.preventDefault(); doRename(); }
  else if((e.key==="Delete"||e.key==="Backspace")&&selName){ e.preventDefault(); doDelete(); }
  else if(e.key==="Enter"&&selName){ const en=selEntry(); if(en&&en.kind==="directory") load(join(current,en.name)); }
});

load("");
</script>
</body>
</html>

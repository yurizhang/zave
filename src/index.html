<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zave</title>
<link rel="stylesheet" href="/assets/tabler-icons.min.css">
<style>
:root{
  --bg:#eaeaea; --win:#f9f9f9; --content:#ffffff; --side:#f3f3f3;
  --text:#1b1b1b; --muted:#5f5f5f; --faint:#909090;
  --accent:#0067c0; --accent-soft:#e8f1fb; --accent-line:#0067c0;
  --border:#e3e3e3; --border-strong:#d2d2d2; --hover:#ececec;
  --folder:#e0a93a; --doc:#2b6cb0; --xls:#1f7a45; --img:#c2820a; --pdf:#c0392b; --aud:#7048b6; --zip:#6b7280;
  --green:#1f7a45; --shadow:rgba(0,0,0,.18);
}
.dark{
  --bg:#1a1a1a; --win:#202020; --content:#272727; --side:#242424;
  --text:#f3f3f3; --muted:#a6a6a6; --faint:#7a7a7a;
  --accent:#4cc2ff; --accent-soft:#0e3a5f; --accent-line:#4cc2ff;
  --border:#393939; --border-strong:#454545; --hover:#323232;
  --folder:#e7b85a; --doc:#5aa9e6; --xls:#4cc38a; --img:#e0b341; --pdf:#e57373; --aud:#a78bfa; --zip:#9ca3af;
  --green:#4cc38a; --shadow:rgba(0,0,0,.5);
}
*{box-sizing:border-box;font-family:"Segoe UI",system-ui,-apple-system,"PingFang SC","Microsoft YaHei",sans-serif}
html,body{margin:0;height:100%}
body{background:var(--win);color:var(--text)}
.win{width:100%;height:100vh;background:var(--win);display:flex;flex-direction:column;overflow:hidden}

.titlebar{display:flex;align-items:center;height:44px;padding-left:10px;gap:3px;background:var(--win);flex:0 0 auto}
.tabs{display:flex;align-items:center;gap:3px;min-width:0;overflow:hidden}
.tab{display:flex;align-items:center;gap:8px;height:34px;padding:0 8px 0 12px;font-size:13px;color:var(--muted);border-radius:9px 9px 0 0;cursor:pointer;user-select:none;max-width:200px;flex:0 1 auto}
.tab.active{background:var(--content);color:var(--text);font-weight:600}
.tab .ti{font-size:16px;flex:0 0 auto}
.tab .nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tab .close{display:flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:4px;color:var(--faint);font-size:13px;flex:0 0 auto}
.tab .close:hover{background:var(--hover);color:var(--text)}
.newtab{display:flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:6px;color:var(--muted);cursor:pointer;flex:0 0 auto}
.newtab:hover{background:var(--hover)}
.spacer{flex:1}
.wbtn{display:flex;align-items:center;justify-content:center;min-width:46px;height:44px;padding:0 8px;color:var(--muted);cursor:pointer;font-size:13px;font-weight:600}
.wbtn:hover{background:var(--hover)}
.wbtn{position:relative}
.wbtn.hasdot::after{content:"";position:absolute;top:9px;right:10px;width:8px;height:8px;border-radius:50%;background:var(--pdf);box-shadow:0 0 0 2px var(--win)}

.cmdbar{display:flex;align-items:center;gap:3px;height:48px;padding:0 12px;background:var(--content);border-bottom:1px solid var(--border);flex:0 0 auto}
.cmd{display:flex;align-items:center;gap:7px;height:34px;padding:0 12px;font-size:13px;color:var(--text);border-radius:7px;cursor:pointer;user-select:none}
.cmd:hover{background:var(--hover)}
.cmd .ti{font-size:17px}
.cmd.primary{background:var(--accent-soft);color:var(--accent)}
.cmd.on{background:var(--accent-soft);color:var(--accent)}
.iconbtn{display:flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:7px;color:var(--text);cursor:pointer}
.iconbtn:hover{background:var(--hover)}
.iconbtn.disabled{color:var(--faint);cursor:default}
.iconbtn.disabled:hover{background:transparent}
.iconbtn .ti{font-size:18px}
.sep{width:1px;height:22px;background:var(--border-strong);margin:0 6px}

.addrbar{display:flex;align-items:center;gap:8px;height:50px;padding:0 14px;background:var(--content);border-bottom:1px solid var(--border);flex:0 0 auto}
.navbtn{display:flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:7px;color:var(--muted);cursor:pointer}
.navbtn:hover{background:var(--hover)}
.navbtn.disabled{color:var(--faint);cursor:default}
.navbtn.disabled:hover{background:transparent}
.address{flex:1;display:flex;align-items:center;gap:5px;height:36px;padding:0 12px;border:1px solid var(--border-strong);border-radius:7px;font-size:13px;min-width:0;background:var(--content);overflow:hidden}
.crumb{color:var(--muted);cursor:pointer;padding:3px 6px;border-radius:5px;white-space:nowrap}
.crumb:hover{background:var(--hover);color:var(--text)}
.crumb.cur{color:var(--text);font-weight:600}
.addr-copy{font-size:16px;color:var(--muted);cursor:pointer;padding:5px;border-radius:5px;flex:0 0 auto}
.addr-copy:hover{background:var(--hover);color:var(--accent)}
.search{display:flex;align-items:center;gap:8px;width:230px;height:36px;padding:0 12px;border:1px solid var(--border-strong);border-radius:7px;font-size:13px;color:var(--faint)}
.search input{border:0;outline:0;background:transparent;font-size:13px;color:var(--text);width:100%}
.search input::placeholder{color:var(--faint)}

.body{display:grid;grid-template-columns:230px minmax(0,1fr) 260px;flex:1 1 auto;min-height:0;background:var(--content)}
.side{background:var(--side);border-right:1px solid var(--border);padding:10px 8px;overflow:auto}
.snode{position:relative;display:flex;align-items:center;gap:9px;height:34px;padding:0 10px;font-size:13px;color:var(--text);border-radius:7px;cursor:pointer;user-select:none}
.snode:hover{background:var(--hover)}
.snode.active{background:var(--accent-soft);font-weight:600}
.snode.active::before{content:"";position:absolute;left:4px;width:3px;height:16px;background:var(--accent-line);border-radius:3px}
.snode .lead{font-size:18px;color:var(--accent)}
.children{padding-left:16px}
.children .snode .lead{font-size:16px}
.sectlabel{font-size:11px;color:var(--faint);padding:10px 12px 4px;letter-spacing:.3px}

.main{padding:8px 10px;overflow:auto;display:flex;flex-direction:column}
.listhead{display:grid;grid-template-columns:1fr 160px 150px 90px;align-items:center;height:30px;padding:0 12px;font-size:12px;color:var(--muted);border-bottom:1px solid var(--border);flex:0 0 auto}
.listhead span{display:flex;align-items:center;gap:4px;cursor:pointer}
.listhead span:hover{color:var(--text)}
.row{display:grid;grid-template-columns:1fr 160px 150px 90px;align-items:center;height:38px;padding:0 12px;font-size:13px;border-radius:7px;cursor:pointer;user-select:none}
.row:hover{background:var(--hover)}
.row.sel{background:var(--accent-soft)}
.row.cut{opacity:.5}
.row .nm{display:flex;align-items:center;gap:11px;min-width:0}
.row .nm .ti{font-size:19px}
.row .nm span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.row .c{color:var(--muted);font-size:12px}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(112px,1fr));gap:6px;padding:10px 4px;align-content:start}
.cell{display:flex;flex-direction:column;align-items:center;gap:9px;padding:16px 8px;border-radius:9px;cursor:pointer;user-select:none}
.cell:hover{background:var(--hover)}
.cell.sel{background:var(--accent-soft)}
.cell.cut{opacity:.5}
.cell .ti{font-size:46px}
.cell .label{font-size:12px;text-align:center;line-height:1.3;max-width:100%;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;line-clamp:2;-webkit-box-orient:vertical}

.details{border-left:1px solid var(--border);padding:18px 16px;overflow:auto;background:var(--content)}
.preview{height:140px;border-radius:9px;background:var(--side);display:flex;align-items:center;justify-content:center;margin-bottom:14px}
.preview .ti{font-size:62px}
.preview img{max-width:100%;max-height:100%;object-fit:contain;border-radius:6px}
.textbox{max-height:260px;overflow:auto;background:var(--side);border-radius:9px;margin-bottom:14px;padding:10px 12px}
.textbox pre{margin:0;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:11px;line-height:1.55;white-space:pre-wrap;word-break:break-word;color:var(--text)}
.textbox .muted{color:var(--faint)}
.pdfbox{width:100%;height:320px;border:0;border-radius:9px;background:var(--side);margin-bottom:14px}
.openbtn{display:flex;align-items:center;justify-content:center;gap:7px;margin-top:16px;width:100%;height:36px;border-radius:7px;background:var(--accent);color:#fff;border:0;font-size:13px;font-weight:600;cursor:pointer}
.openbtn:hover{filter:brightness(1.08)}
.openbtn .ti{font-size:16px}
.dname{font-size:15px;font-weight:600;margin-bottom:2px;word-break:break-word}
.dtype{font-size:12px;color:var(--muted);margin-bottom:16px}
.drow{display:flex;justify-content:space-between;gap:10px;font-size:12px;padding:7px 0;border-top:1px solid var(--border)}
.drow .k{color:var(--muted);flex:0 0 auto}
.drow .v{text-align:right;word-break:break-all}
.dempty{color:var(--faint);font-size:12px;text-align:center;margin-top:40px}

.statusbar{display:flex;align-items:center;gap:18px;height:30px;padding:0 16px;background:var(--win);border-top:1px solid var(--border);font-size:12px;color:var(--muted);flex:0 0 auto}
.viewtoggle{display:flex;gap:2px}
.vbtn{display:flex;align-items:center;justify-content:center;width:30px;height:24px;border-radius:6px;color:var(--muted);cursor:pointer}
.vbtn:hover{background:var(--hover)}
.vbtn.active{background:var(--accent-soft);color:var(--accent)}
.hidden{display:none!important}
.empty{color:var(--faint);padding:30px;font-size:13px;text-align:center}
.toast{position:fixed;bottom:46px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:600;opacity:0;transition:opacity .2s;pointer-events:none;max-width:80%;box-shadow:0 6px 20px var(--shadow);z-index:9}
.toast.show{opacity:1}
.toast.bad{background:var(--pdf)}
.ctxmenu{position:fixed;z-index:50;min-width:184px;background:var(--content);border:1px solid var(--border-strong);border-radius:9px;box-shadow:0 12px 34px var(--shadow);padding:5px;font-size:13px}
.ctxitem{display:flex;align-items:center;gap:11px;height:32px;padding:0 10px;border-radius:6px;cursor:pointer;color:var(--text)}
.ctxitem:hover{background:var(--hover)}
.ctxitem.disabled{color:var(--faint);cursor:default}
.ctxitem.disabled:hover{background:transparent}
.ctxitem.danger{color:var(--pdf)}
.ctxitem .ti{font-size:17px;width:18px;text-align:center}
.ctxsep{height:1px;background:var(--border);margin:5px 6px}
.ctxitem .val{margin-left:auto;color:var(--faint);font-size:12px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:60}
.about{position:relative;width:380px;max-width:90vw;background:var(--content);border:1px solid var(--border-strong);border-radius:14px;box-shadow:0 20px 60px var(--shadow);padding:26px;text-align:center;color:var(--text)}
.about-x{position:absolute;top:12px;right:12px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:7px;color:var(--muted);cursor:pointer;font-size:18px}
.about-x:hover{background:var(--hover);color:var(--text)}
.about .logo{font-size:54px;color:var(--accent)}
.about h2{margin:10px 0 2px;font-size:20px}
.about .ver{color:var(--muted);font-size:13px;margin-bottom:8px}
.about p{color:var(--muted);font-size:13px;line-height:1.6;margin:10px 4px}
.about .links{display:flex;flex-direction:column;gap:8px;margin-top:18px}
.about .btn{display:flex;align-items:center;justify-content:center;gap:8px;height:38px;border-radius:8px;text-decoration:none;font-size:13px;font-weight:600;cursor:pointer;border:0}
.about .btn.gh{background:var(--accent);color:#fff}
.about .btn.close{background:var(--hover);color:var(--text)}
.about .btn .ti{font-size:17px}
.about .author{display:flex;align-items:center;justify-content:center;gap:6px;font-size:13px;color:var(--muted);margin-top:6px}
.about .author .ti{font-size:16px;color:var(--accent)}
.about .author a{color:var(--accent);text-decoration:none;font-weight:600}
.about .author a:hover{text-decoration:underline}
.about .field{display:flex;flex-direction:column;gap:6px;text-align:left;margin:16px 2px 4px}
.about .field label{font-size:12px;color:var(--muted)}
.about input.port{height:38px;border:1px solid var(--border-strong);border-radius:8px;background:var(--content);color:var(--text);padding:0 12px;font-size:14px;font-family:ui-monospace,Menlo,monospace}
.about input.port:focus{outline:none;border-color:var(--accent)}
.about .meta{margin-top:14px;font-size:11px;color:var(--faint)}
.row.drop,.cell.drop,.snode.drop,.crumb.drop{outline:2px solid var(--accent);outline-offset:-2px;background:var(--accent-soft)}
.row[draggable],.cell[draggable]{-webkit-user-drag:element}
</style>
</head>
<body>
<div class="win">

  <div class="titlebar">
    <div class="tabs" id="tabbar"></div>
    <div class="newtab" id="newTabBtn" data-i18n-title="newTabTitle"><i class="ti ti-plus"></i></div>
    <div class="spacer"></div>
    <div class="wbtn" id="menuBtn" data-i18n-title="menu"><i class="ti ti-settings" style="font-size:18px"></i></div>
  </div>

  <div class="cmdbar">
    <div class="cmd primary" id="mkdirBtn"><i class="ti ti-plus"></i><span data-i18n="newFolder">New folder</span></div>
    <div class="sep"></div>
    <div class="iconbtn" id="cutBtn" data-i18n-title="cut"><i class="ti ti-scissors"></i></div>
    <div class="iconbtn" id="copyBtn" data-i18n-title="copy"><i class="ti ti-copy"></i></div>
    <div class="iconbtn" id="pasteBtn" data-i18n-title="paste"><i class="ti ti-clipboard"></i></div>
    <div class="iconbtn" id="renameBtn" data-i18n-title="rename"><i class="ti ti-pencil"></i></div>
    <div class="iconbtn" id="shareBtn" data-i18n-title="share"><i class="ti ti-share"></i></div>
    <div class="iconbtn" id="delBtn" data-i18n-title="del"><i class="ti ti-trash"></i></div>
    <div class="sep"></div>
    <div class="cmd" id="sortBtn"><i class="ti ti-arrows-sort"></i><span data-i18n="sort">Sort</span></div>
    <div class="cmd" id="viewMenu"><i class="ti ti-layout-grid"></i><span data-i18n="view">View</span></div>
    <div class="cmd" id="hiddenBtn"><i class="ti ti-eye"></i><span data-i18n="hidden">Hidden</span></div>
  </div>

  <div class="addrbar">
    <div class="navbtn" id="backBtn" data-i18n-title="back"><i class="ti ti-arrow-left"></i></div>
    <div class="navbtn" id="fwdBtn" data-i18n-title="forward"><i class="ti ti-arrow-right"></i></div>
    <div class="navbtn" id="upBtn" data-i18n-title="up"><i class="ti ti-arrow-up"></i></div>
    <div class="navbtn" id="refreshBtn" data-i18n-title="refresh"><i class="ti ti-refresh" style="font-size:17px"></i></div>
    <div class="address" id="crumbs"></div>
    <div class="search"><i class="ti ti-search" style="font-size:16px"></i><input id="filter"></div>
  </div>

  <div class="body">
    <nav class="side" id="side"></nav>
    <section class="main">
      <div class="listhead" id="listhead">
        <span data-sort="name"><span data-i18n="name">Name</span> <i class="ti" id="sortArrow"></i></span>
        <span data-sort="mtime"><span data-i18n="dateModified">Date modified</span></span>
        <span data-sort="type"><span data-i18n="type">Type</span></span>
        <span data-sort="size"><span data-i18n="size">Size</span></span>
      </div>
      <div id="listView"></div>
      <div id="gridView" class="grid hidden"></div>
    </section>
    <aside class="details" id="details"></aside>
  </div>

  <div class="statusbar">
    <span id="count"></span>
    <span id="selinfo"></span>
    <div class="spacer"></div>
    <div class="viewtoggle">
      <div class="vbtn active" data-view="list" data-i18n-title="details"><i class="ti ti-layout-list"></i></div>
      <div class="vbtn" data-view="grid" data-i18n-title="largeIcons"><i class="ti ti-layout-grid"></i></div>
    </div>
  </div>

</div>
<div class="toast" id="toast"></div>

const join = (dir, name) => (dir.endsWith("/") ? dir : dir + "/") + name;
function basename(p){ if(p==="/"||p==="") return p; const x=p.replace(/\/+$/,""); return x.slice(x.lastIndexOf("/")+1); }
function parentOf(p){ if(p==="/"||p==="") return p; const x=p.replace(/\/+$/,""); const i=x.lastIndexOf("/"); return i<=0?"/":x.slice(0,i); }

function fmtSize(n, isDir){
  if(isDir) return "";
  if(n<1024) return n+" B";
  if(n<1048576) return (n/1024).toFixed(0)+" KB";
  if(n<1073741824) return (n/1048576).toFixed(1)+" MB";
  return (n/1073741824).toFixed(2)+" GB";
}
function fmtDate(ms){
  if(!ms) return "—";
  const d=new Date(ms), p=(x)=>String(x).padStart(2,"0");
  return `${d.getFullYear()}/${p(d.getMonth()+1)}/${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
}
function ext(name){ const i=name.lastIndexOf("."); return i<=0?"":name.slice(i+1).toLowerCase(); }

function meta(e){
  if(e.kind==="directory") return {ic:"ti-folder", col:"var(--folder)", tl:t("folder")};
  const m=TYPE_MAP[ext(e.name)];
  if(m) return {ic:m[0], col:m[1], tl:(lang==="en"?m[2]:m[3])};
  const ex=ext(e.name);
  return {ic:"ti-file", col:"var(--faint)", tl: ex ? ex.toUpperCase()+t("fileSuffix") : t("file")};
}

let toastTimer=null;
function toast(msg, bad, ms){
  const el=$("#toast"); el.textContent=msg; el.className="toast show"+(bad?" bad":"");
  if(toastTimer) clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.className="toast", ms||1600);
}
async function copyText(text){
  try{ await navigator.clipboard.writeText(text); toast(t("pathCopied")+text); }
  catch{ toast(t("copyFailed"),true); }
}

// ───────── filter + sort ─────────
function visible(){
  const q=filterText.trim().toLowerCase();
  let list=entries.filter(e=>{
    if(!showHidden && e.name.startsWith(".")) return false;
    if(q && !e.name.toLowerCase().includes(q)) return false;
    return true;
  });
  list.sort((a,b)=>{
    if(a.kind!==b.kind) return a.kind==="directory"?-1:1; // folders always first
    let r=0;
    if(sortKey==="name") r=a.name.localeCompare(b.name);
    else if(sortKey==="size") r=a.size-b.size;
    else if(sortKey==="mtime") r=a.mtime-b.mtime;
    else if(sortKey==="type") r=meta(a).tl.localeCompare(meta(b).tl)||a.name.localeCompare(b.name);
    return sortAsc?r:-r;
  });
  return list;
}

// ───────── selection (multi) ─────────
// selName = anchor (focus); selSet = all selected names in current dir
function singleSel(name){ selSet=new Set([name]); selName=name; }
function toggleSel(name){ if(selSet.has(name)) selSet.delete(name); else selSet.add(name); selName = selSet.has(name) ? name : ([...selSet].pop()||null); }
function rangeSel(name){
  const list=visible().map(e=>e.name);
  const a=list.indexOf(selName), b=list.indexOf(name);
  if(a===-1){ singleSel(name); return; }
  const [lo,hi]=a<b?[a,b]:[b,a];
  selSet=new Set(list.slice(lo,hi+1));   // anchor (selName) stays the origin
}
function selectAll(){ const l=visible(); selSet=new Set(l.map(e=>e.name)); selName=l.length?l[l.length-1].name:null; render(); }
function selPaths(){ return [...selSet].map(n=>join(current,n)); }

// ───────── render ─────────
function render(){
  const list=visible();
  const lv=$("#listView"), gv=$("#gridView");
  if(list.length===0){
    const msg=filterText?t("noMatch"):t("emptyFolder");
    lv.innerHTML=`<div class="empty">${msg}</div>`; gv.innerHTML=`<div class="empty">${msg}</div>`;
  } else if(view==="list"){
    lv.innerHTML=list.map(e=>{
      const m=meta(e), full=join(current,e.name);
      const isCut=clipboard&&clipboard.op==="cut"&&clipboard.items.some(it=>it.path===full);
      return `<div class="row ${selSet.has(e.name)?'sel':''} ${isCut?'cut':''}" data-n="${encodeURIComponent(e.name)}">
        <div class="nm"><i class="ti ${m.ic}" style="color:${m.col}"></i><span>${escapeHtml(e.name)}</span></div>
        <div class="c">${fmtDate(e.mtime)}</div><div class="c">${m.tl}</div><div class="c">${fmtSize(e.size,e.kind==='directory')||'—'}</div>
      </div>`;
    }).join("");
    bindRows(lv,".row");
  } else {
    gv.innerHTML=list.map(e=>{
      const m=meta(e), full=join(current,e.name);
      const isCut=clipboard&&clipboard.op==="cut"&&clipboard.items.some(it=>it.path===full);
      return `<div class="cell ${selSet.has(e.name)?'sel':''} ${isCut?'cut':''}" data-n="${encodeURIComponent(e.name)}">
        <i class="ti ${m.ic}" style="color:${m.col}"></i><div class="label">${escapeHtml(e.name)}</div>
      </div>`;
    }).join("");
    bindRows(gv,".cell");
  }
  lv.classList.toggle("hidden",view!=="list");
  gv.classList.toggle("hidden",view!=="grid");
  $("#listhead").classList.toggle("hidden",view!=="list");
  $("#sortArrow").className="ti "+(sortKey==="name"?(sortAsc?"ti-chevron-up":"ti-chevron-down"):"");
  $("#count").textContent=t("items")(list.length);
  $("#selinfo").textContent=selSet.size?t("selectedN")(selSet.size):"";
  renderDetails();
  updateButtons();
}
function escapeHtml(s){ return s.replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c])); }
function bindRows(container,sel){
  container.querySelectorAll(sel).forEach(el=>{
    const name=decodeURIComponent(el.dataset.n);
    const e=entries.find(x=>x.name===name);
    const full=join(current,name);
    el.onclick=(ev)=>{
      if(ev.metaKey||ev.ctrlKey) toggleSel(name);
      else if(ev.shiftKey) rangeSel(name);
      else singleSel(name);
      render();
    };
    el.ondblclick=()=>{ if(e.kind==="directory") load(full); else copyText(full); };
    el.oncontextmenu=(ev)=>{ ev.preventDefault(); ev.stopPropagation(); if(!selSet.has(name)) singleSel(name); else selName=name; render(); itemMenu(ev.clientX,ev.clientY,e); };
    // draggable source — drags the whole selection if this item is part of it
    el.draggable=true;
    el.ondragstart=(ev)=>{ if(!selSet.has(name)){ singleSel(name); render(); } dragItems=selPaths(); ev.dataTransfer.effectAllowed="move"; ev.dataTransfer.setData("text/plain",dragItems.join("\n")); };
    el.ondragend=()=>{ dragItems=[]; document.querySelectorAll(".drop").forEach(x=>x.classList.remove("drop")); };
    // folders are drop targets
    if(e.kind==="directory") makeDropTarget(el,full);
  });
}
function renderDetails(){
  const d=$("#details");
  if(selSet.size>1){
    const items=[...selSet].map(n=>entries.find(x=>x.name===n)).filter(Boolean);
    const folders=items.filter(x=>x.kind==="directory").length;
    const files=items.filter(x=>x.kind!=="directory");
    const total=files.reduce((s,x)=>s+x.size,0);
    let rows=`<div class="drow"><span class="k">${t("items")(items.length)}</span><span class="v">${folders} 📁 / ${files.length} 📄</span></div>`;
    rows+=`<div class="drow"><span class="k">${t("total")}</span><span class="v">${fmtSize(total,false)}</span></div>`;
    d.innerHTML=`<div class="preview"><i class="ti ti-files" style="color:var(--accent)"></i></div>
      <div class="dname">${t("itemsSelected")(items.length)}</div><div class="dtype">&nbsp;</div>${rows}`;
    return;
  }
  const an=selName||(selSet.size===1?[...selSet][0]:null);
  const e=entries.find(x=>x.name===an);
  if(!e){ d.innerHTML=`<div class="dempty">${t("noSelection")}<br>${t("clickHint")}</div>`; return; }
  const m=meta(e), full=join(current,e.name), ex=ext(e.name), isFile=e.kind!=="directory";
  const url="/api/file?path="+encodeURIComponent(full);

  // ── preview area ──
  let previewHtml, fillText=false;
  if(isFile && ex==="pdf" && e.size<=PDF_MAX){
    previewHtml=`<iframe class="pdfbox" src="${url}#toolbar=0" title="${escapeHtml(e.name)}"></iframe>`;
  } else if(isFile && IMG_EXT.has(ex) && e.size<=IMG_MAX){
    previewHtml=`<div class="preview"><img src="${url}" alt=""></div>`;
  } else if(isFile && (TEXT_EXT.has(ex) || ex==="") && e.size<=TEXT_MAX){
    previewHtml=`<div class="textbox" id="textPrev"><span class="muted">${t("loading")}</span></div>`;
    fillText=true;
  } else {
    previewHtml=`<div class="preview"><i class="ti ${m.ic}" style="color:${m.col}"></i></div>`;
  }

  // ── property rows ──
  let rows=`<div class="drow"><span class="k">${t("type")}</span><span class="v">${m.tl}</span></div>`;
  rows+=`<div class="drow"><span class="k">${t("dateModified")}</span><span class="v">${fmtDate(e.mtime)}</span></div>`;
  if(isFile) rows+=`<div class="drow"><span class="k">${t("size")}</span><span class="v">${fmtSize(e.size,false)}</span></div>`;
  rows+=`<div class="drow"><span class="k">${t("fullPath")}</span><span class="v">${escapeHtml(full)}</span></div>`;

  d.innerHTML=`${previewHtml}<div class="dname">${escapeHtml(e.name)}</div><div class="dtype">${m.tl}</div>${rows}
    <button class="openbtn" id="openBtn"><i class="ti ti-external-link"></i>${t("openWith")}</button>`;
  $("#openBtn").onclick=()=>openExternal(full);

  // ── lazily load text preview ──
  if(fillText){
    const box=$("#textPrev"); const want=full;
    fetch(url).then(r=>r.text()).then(txt=>{
      if(selSet.size!==1 || !selSet.has(e.name) || join(current,e.name)!==want) return; // selection changed
      if(!box.isConnected) return;
      const clipped=txt.length>20000;
      const pre=document.createElement("pre");
      pre.textContent = clipped ? txt.slice(0,20000)+"\n\n…" : (txt || "");
      box.innerHTML=""; box.appendChild(pre);
      if(!txt) box.innerHTML=`<span class="muted">${t("previewEmpty")}</span>`;
    }).catch(()=>{ if(box.isConnected) box.innerHTML=`<span class="muted">—</span>`; });
  }
}
async function openExternal(path){
  if(await api("/api/open?path="+encodeURIComponent(path),t("opened"))) {}
}
async function openTerminal(path){
  await api("/api/terminal?path="+encodeURIComponent(path),t("terminalOpened"));
}

// ───────── drag & drop (move) ─────────
function validDrop(src,destDir){
  if(!src||!destDir) return false;
  if(destDir===src) return false;                 // onto itself
  if(destDir.startsWith(src+"/")) return false;    // into its own descendant
  if(join(destDir,basename(src))===src) return false; // already in that folder
  return true;
}
function canDropAny(destDir){ return dragItems.length>0 && dragItems.some(src=>validDrop(src,destDir)); }
async function doDrop(destDir){
  const srcs=dragItems.filter(src=>validDrop(src,destDir));
  if(!srcs.length) return;
  let ok=0;
  for(const src of srcs){
    const dest=join(destDir,basename(src));
    const res=await fetch("/api/move?from="+encodeURIComponent(src)+"&to="+encodeURIComponent(dest),{method:"POST"});
    const d=await res.json(); if(!d.error) ok++;
  }
  clipboard=null;
  toast(t("moved")+(srcs.length>1?` (${ok})`:""));
  load(current,true);
}
// attach drop behaviour to any element that represents a target folder
function makeDropTarget(el,destDir){
  el.ondragover=(ev)=>{ if(canDropAny(destDir)){ ev.preventDefault(); ev.dataTransfer.dropEffect="move"; el.classList.add("drop"); } };
  el.ondragleave=()=>el.classList.remove("drop");
  el.ondrop=(ev)=>{ ev.preventDefault(); el.classList.remove("drop"); doDrop(destDir); };
}

// ───────── context menu ─────────
function closeMenu(){ const m=$("#ctxmenu"); if(m) m.remove(); }
function showMenu(x,y,items){
  closeMenu();
  const m=document.createElement("div"); m.className="ctxmenu"; m.id="ctxmenu";
  for(const it of items){
    if(it.sep){ const s=document.createElement("div"); s.className="ctxsep"; m.appendChild(s); continue; }
    const el=document.createElement("div");
    el.className="ctxitem"+(it.disabled?" disabled":"")+(it.danger?" danger":"");
    el.innerHTML=`<i class="ti ${it.icon}"></i>${it.label}`;
    if(!it.disabled) el.onclick=()=>{ closeMenu(); it.action(); };
    m.appendChild(el);
  }
  document.body.appendChild(m);
  const r=m.getBoundingClientRect();
  m.style.left=Math.max(4,Math.min(x,window.innerWidth-r.width-6))+"px";
  m.style.top=Math.max(4,Math.min(y,window.innerHeight-r.height-6))+"px";
}
function itemMenu(x,y,e){
  const full=join(current,e.name);
  showMenu(x,y,[
    {icon:"ti-external-link", label:t("mOpen"), action:()=>openExternal(full)},
    ...(e.kind==="directory" ? [
      {icon:"ti-folder", label:t("mOpenNewTab"), action:()=>newTab(full)},
      {icon:"ti-terminal-2", label:t("mTerminal"), action:()=>openTerminal(full)},
    ] : []),
    {sep:true},
    {icon:"ti-scissors", label:t("mCut"), action:doCut},
    {icon:"ti-copy", label:t("mCopy"), action:doCopy},
    {icon:"ti-clipboard", label:t("mPaste"), action:doPaste, disabled:!clipboard},
    {sep:true},
    {icon:"ti-pencil", label:t("mRename"), action:doRename},
    {icon:"ti-link", label:t("mCopyPath"), action:()=>copyText(full)},
    {sep:true},
    {icon:"ti-file-zip", label:t("mZip"), action:doZip},
    ...(ext(e.name)==="zip" ? [{icon:"ti-file-export", label:t("mUnzip"), action:doUnzip}] : []),
    {icon:"ti-trash", label:t("mDelete"), action:doDelete, danger:true},
  ]);
}
function bgMenu(x,y){
  showMenu(x,y,[
    {icon:"ti-folder-plus", label:t("mNewFolder"), action:doMkdir},
    {icon:"ti-clipboard", label:t("mPaste"), action:doPaste, disabled:!clipboard},
    {icon:"ti-terminal-2", label:t("mTerminal"), action:()=>openTerminal(current)},
    {sep:true},
    {icon:"ti-refresh", label:t("mRefresh"), action:()=>load(current,true)},
  ]);
}
function updateButtons(){
  const has=selSet.size>0, single=selSet.size===1;
  ["cutBtn","copyBtn","delBtn"].forEach(id=>$("#"+id).classList.toggle("disabled",!has));
  ["renameBtn","shareBtn"].forEach(id=>$("#"+id).classList.toggle("disabled",!single));
  $("#pasteBtn").classList.toggle("disabled",!clipboard);
  $("#hiddenBtn").classList.toggle("on",showHidden);
}
function setSearchPlaceholder(){ $("#filter").placeholder=t("searchPrefix")+(basename(current)||"/"); }

// move selection with the keyboard; delta=±1, or "first"/"last"; extend grows selSet
function moveSel(delta, extend){
  const list=visible();
  if(list.length===0) return;
  let idx=list.findIndex(e=>e.name===selName);
  if(delta==="first") idx=0;
  else if(delta==="last") idx=list.length-1;
  else if(idx===-1) idx = delta>0 ? 0 : list.length-1;
  else idx = Math.max(0, Math.min(list.length-1, idx+delta));
  const name=list[idx].name;
  if(extend){ selSet.add(name); selName=name; } else { singleSel(name); }
  render();
  const el=document.querySelector((view==="list"?"#listView":"#gridView")+" .sel");
  if(el) el.scrollIntoView({block:"nearest"});
}

// ───────── load / navigation ─────────
async function load(path, fromHist, silent){
  try{
    const res=await fetch("/api/list?path="+encodeURIComponent(path));
    const data=await res.json();
    if(data.error){ if(!silent) toast(t("cannotOpen")+data.error,true); return false; }
    current=data.path; home=data.home||home; entries=data.entries;
    selName=null; selSet=new Set(); filterText=""; $("#filter").value="";
    if(!fromHist){ hist=hist.slice(0,histIdx+1); hist.push(current); histIdx=hist.length-1; }
    try{ localStorage.setItem("fm-last-dir", current); }catch{}  // remember for next launch
    setSearchPlaceholder();
    buildSide(); buildCrumbs(); renderTabbar(); render(); updateNav();
    $(".main").scrollTop=0;
    return true;
  }catch(err){ if(!silent) toast(t("loadFailed")+err,true); return false; }
}
function updateNav(){
  $("#backBtn").classList.toggle("disabled",histIdx<=0);
  $("#fwdBtn").classList.toggle("disabled",histIdx>=hist.length-1);
}

// ───────── tabs ─────────
function renderTabbar(){
  const bar=$("#tabbar"); bar.innerHTML="";
  tabs.forEach((tb,i)=>{
    const cur = (i===active) ? current : tb.current;
    const el=document.createElement("div");
    el.className="tab"+(i===active?" active":"");
    el.innerHTML=`<i class="ti ti-folder"></i><span class="nm">${escapeHtml(basename(cur)||"/")}</span>`;
    if(tabs.length>1){
      const x=document.createElement("i"); x.className="ti ti-x close";
      x.onclick=(ev)=>{ ev.stopPropagation(); closeTab(i); };
      el.appendChild(x);
    }
    el.onclick=()=>switchTab(i);
    bar.appendChild(el);
  });
}
function snapshotActive(){
  tabs[active]={ current, hist:hist.slice(), histIdx, selName, selSet:[...selSet], entries, filterText };
}
function restoreLive(s){
  current=s.current; hist=(s.hist||[]).slice(); histIdx=(s.histIdx??-1);
  selName=s.selName||null; selSet=new Set(s.selSet||[]); entries=s.entries||[]; filterText=s.filterText||"";
  $("#filter").value=filterText; setSearchPlaceholder();
  buildSide(); buildCrumbs(); renderTabbar(); render(); updateNav();
  $(".main").scrollTop=0;
}
function newTab(path){
  snapshotActive();
  tabs.push({ current:"", hist:[], histIdx:-1, selName:null, entries:[], filterText:"" });
  active=tabs.length-1;
  hist=[]; histIdx=-1; selName=null; filterText=""; entries=[];
  load(path||home||"");
}
function switchTab(i){
  if(i===active) return;
  snapshotActive();
  active=i;
  restoreLive(tabs[i]);
}
function closeTab(i){
  if(tabs.length<=1) return;
  const wasActive=(i===active);
  tabs.splice(i,1);
  if(!wasActive){ if(active>i) active--; renderTabbar(); return; }
  active=Math.min(i,tabs.length-1);
  restoreLive(tabs[active]);
}

// ───────── POST wrapper ─────────
async function api(url, okMsg){
  try{
    const res=await fetch(url,{method:"POST"});
    const data=await res.json();
    if(data.error){ toast(t("failed")+data.error,true); return false; }
    if(okMsg) toast(okMsg); return true;
  }catch(err){ toast(t("requestFailed")+err,true); return false; }
}

// ───────── file operations ─────────
const selEntry=()=>entries.find(x=>x.name===selName);
async function doMkdir(){
  const name=prompt(t("newFolderPrompt"),t("newFolderDefault")); if(!name) return;
  if(await api("/api/mkdir?path="+encodeURIComponent(join(current,name)),t("created"))) load(current,true);
}
function grab(op){ if(!selSet.size) return; clipboard={items:[...selSet].map(n=>({path:join(current,n),name:n})),op}; toast((op==="cut"?t("cutDone"):t("copyDone"))+(selSet.size>1?` (${selSet.size})`:"")); render(); }
function doCut(){ grab("cut"); }
function doCopy(){ grab("copy"); }
async function doPaste(){
  if(!clipboard||!clipboard.items.length) return;
  let ok=0;
  for(const it of clipboard.items){
    const dest=join(current,it.name);
    if(dest===it.path) continue;
    const u=(clipboard.op==="cut"?"/api/move":"/api/copy")+"?from="+encodeURIComponent(it.path)+"&to="+encodeURIComponent(dest);
    const res=await fetch(u,{method:"POST"}); const d=await res.json(); if(!d.error) ok++;
  }
  toast((clipboard.op==="cut"?t("moved"):t("copyDone"))+(clipboard.items.length>1?` (${ok})`:""));
  if(clipboard.op==="cut") clipboard=null;
  load(current,true);
}
async function doRename(){
  const e=selEntry(); if(!e) return;   // single item (anchor)
  const name=prompt(t("renamePrompt"),e.name); if(!name||name===e.name) return;
  if(await api("/api/move?from="+encodeURIComponent(join(current,e.name))+"&to="+encodeURIComponent(join(current,name)),t("renamed"))) load(current,true);
}
async function doDelete(){
  if(!selSet.size) return;
  const names=[...selSet];
  const one=entries.find(x=>x.name===names[0]);
  const msg = names.length===1 ? join(current,names[0])+(one&&one.kind==="directory"?"\n\n"+t("folderNote"):"") : t("deleteN")(names.length);
  if(!confirm(t("deleteConfirm")+"\n\n"+msg)) return;
  let ok=0;
  for(const n of names){ const res=await fetch("/api/delete?path="+encodeURIComponent(join(current,n)),{method:"POST"}); const d=await res.json(); if(!d.error) ok++; }
  clipboard=null;
  toast(t("deleted")+(names.length>1?` (${ok})`:""));
  load(current,true);
}
async function doZip(){
  const e=selEntry(); if(!e) return;
  if(await api("/api/zip?path="+encodeURIComponent(join(current,e.name)),t("zipped"))) load(current,true);
}
async function doUnzip(){
  const e=selEntry(); if(!e) return;
  if(await api("/api/unzip?path="+encodeURIComponent(join(current,e.name)),t("unzipped"))) load(current,true);
}

// ───────── event bindings ─────────
$("#mkdirBtn").onclick=doMkdir;
$("#cutBtn").onclick=doCut;
$("#copyBtn").onclick=doCopy;
$("#pasteBtn").onclick=doPaste;
$("#renameBtn").onclick=doRename;
$("#delBtn").onclick=doDelete;
$("#shareBtn").onclick=()=>{ const e=selEntry(); if(e) copyText(join(current,e.name)); };

$("#backBtn").onclick=()=>{ if(histIdx>0){ histIdx--; load(hist[histIdx],true); } };
$("#fwdBtn").onclick=()=>{ if(histIdx<hist.length-1){ histIdx++; load(hist[histIdx],true); } };
$("#upBtn").onclick=()=>load(parentOf(current));
$("#refreshBtn").onclick=()=>load(current,true);
$("#newTabBtn").onclick=()=>newTab();

$("#filter").addEventListener("input",e=>{ filterText=e.target.value; render(); });
$("#hiddenBtn").onclick=()=>{ showHidden=!showHidden; render(); toast(showHidden?t("showingHidden"):t("hidingHidden")); };
$("#viewMenu").onclick=()=>setView(view==="list"?"grid":"list");
$("#sortBtn").onclick=()=>{ const keys=["name","mtime","type","size"]; sortKey=keys[(keys.indexOf(sortKey)+1)%keys.length]; render(); toast(t("sortedBy")+t("sortNames")[sortKey]); };

document.querySelectorAll(".listhead span[data-sort]").forEach(s=>s.onclick=()=>{
  const k=s.dataset.sort; if(k===sortKey) sortAsc=!sortAsc; else { sortKey=k; sortAsc=true; } render();
});
document.querySelectorAll(".vbtn").forEach(b=>b.onclick=()=>setView(b.dataset.view));

// right-click: empty area of the file pane → background menu
$(".main").addEventListener("contextmenu",ev=>{ ev.preventDefault(); bgMenu(ev.clientX,ev.clientY); });
// dismiss the menu on any click / scroll / window blur
document.addEventListener("click",closeMenu);
document.addEventListener("scroll",closeMenu,true);
window.addEventListener("blur",closeMenu);
function setView(v){
  view=v;
  document.querySelectorAll(".vbtn").forEach(x=>x.classList.toggle("active",x.dataset.view===v));
  render();
}

// language switch (persisted, like the theme toggle)
function applyLang(l){
  lang = (l==="zh"?"zh":"en");
  try{ localStorage.setItem("fm-lang",lang); }catch{}
  applyStatic(); setSearchPlaceholder(); buildSide(); buildCrumbs(); render();
}
(function(){ let l="zh"; try{ l=localStorage.getItem("fm-lang")||"zh"; }catch{} lang=(l==="zh"?"zh":"en"); })();

// theme (persisted)
function applyTheme(dark){
  document.documentElement.classList.toggle("dark",dark);
  try{ localStorage.setItem("fm-theme",dark?"dark":"light"); }catch{}
}
(function(){ let th="light"; try{ th=localStorage.getItem("fm-theme")||"light"; }catch{} applyTheme(th==="dark"); })();

// ───────── top-right menu + About ─────────
function openAppMenu(ev){
  const dark=document.documentElement.classList.contains("dark");
  showMenu(ev.clientX, ev.clientY, [
    {icon:"ti-bell", label:t("menuNotice")+(noticeUnseen()?` <span class="val" style="color:var(--pdf)">●</span>`:""), action:showNotice},
    {sep:true},
    {icon:"ti-language", label:t("menuLanguage")+`<span class="val">${lang==="en"?"English":"中文"}</span>`, action:()=>applyLang(lang==="en"?"zh":"en")},
    {icon:dark?"ti-moon":"ti-sun", label:t("menuTheme")+`<span class="val">${dark?t("themeDark"):t("themeLight")}</span>`, action:()=>applyTheme(!document.documentElement.classList.contains("dark"))},
    {sep:true},
    {icon:"ti-adjustments", label:t("sysConfig"), action:showConfig},
    {icon:"ti-info-circle", label:t("about"), action:showAbout},
  ]);
}

// ───────── remote notices ─────────
function noticeUnseen(){
  if(!notice||!notice.id) return false;
  let seen=""; try{ seen=localStorage.getItem("fm-notice-seen")||""; }catch{}
  return seen!==notice.id;
}
async function fetchNotice(){
  try{
    const r=await fetch(NOTICE_URL+"?t="+Date.now(),{cache:"no-store"});
    if(!r.ok) return;
    const d=await r.json();
    notice=(d&&d.id)?d:null;
    if(noticeUnseen()){
      $("#menuBtn").classList.add("hasdot");          // red dot until opened
      let toasted=""; try{ toasted=localStorage.getItem("fm-notice-toasted")||""; }catch{}
      if(toasted!==notice.id){                          // toast at most once, ever
        try{ localStorage.setItem("fm-notice-toasted",notice.id); }catch{}
        toast((notice.title?notice.title+": ":"")+(notice.message||""), notice.level==="critical"||notice.level==="warning", 6000);
      }
    } else {
      $("#menuBtn").classList.remove("hasdot");
    }
  }catch{}
}
function showNotice(){
  closeAbout();
  const n=notice;
  const body = (n&&n.id)
    ? `<div class="dname" style="margin-top:6px">${escapeHtml(n.title||t("menuNotice"))}</div><p>${escapeHtml(n.message||"")}</p>`+
      (n.url?`<div class="links"><a class="btn gh" href="${escapeHtml(n.url)}" target="_blank" rel="noopener"><i class="ti ti-external-link"></i>${t("noticeOpen")}</a></div>`:"")
    : `<p class="dempty">${t("noticeNone")}</p>`;
  const ov=document.createElement("div"); ov.className="overlay"; ov.id="aboutOverlay";
  ov.innerHTML=`<div class="about">
    <i class="ti ti-x about-x" id="ntClose" title="${t("aboutClose")}"></i>
    <div class="logo"><i class="ti ti-bell"></i></div>${body}</div>`;
  ov.onclick=(e)=>{ if(e.target===ov) closeAbout(); };
  document.body.appendChild(ov);
  $("#ntClose").onclick=closeAbout;
  if(n&&n.id){ try{ localStorage.setItem("fm-notice-seen",n.id); }catch{} $("#menuBtn").classList.remove("hasdot"); }
}
function showConfig(){
  closeAbout();
  const cur=location.port||"";
  const ov=document.createElement("div"); ov.className="overlay"; ov.id="aboutOverlay";
  ov.innerHTML=`<div class="about">
    <i class="ti ti-x about-x" id="cfgClose" title="${t("aboutClose")}"></i>
    <div class="logo"><i class="ti ti-settings"></i></div>
    <h2>${t("sysConfig")}</h2>
    <div class="field"><label>${t("cfgPort")}</label><input class="port" id="cfgPort" type="number" min="1" max="65535" value="${cur}"></div>
    <div class="meta" style="margin-top:6px">${t("cfgNote")}</div>
    <div class="links"><button class="btn gh" id="cfgSave"><i class="ti ti-device-floppy"></i>${t("cfgSave")}</button></div>
  </div>`;
  ov.onclick=(e)=>{ if(e.target===ov) closeAbout(); };
  document.body.appendChild(ov);
  $("#cfgClose").onclick=closeAbout;
  $("#cfgSave").onclick=saveConfig;
  const inp=$("#cfgPort"); inp.focus(); inp.select();
  inp.addEventListener("keydown",e=>{ if(e.key==="Enter") saveConfig(); });
}
async function saveConfig(){
  const v=parseInt($("#cfgPort").value,10);
  if(!(v>=1&&v<=65535)){ toast(t("cfgInvalid"),true); return; }
  if(!await api("/api/config?port="+v)) return;        // persist the port
  toast(t("cfgRestarting"));
  fetch("/api/restart",{method:"POST"}).catch(()=>{}); // triggers exec; connection will drop
  // wait for the new port to come up, then jump there
  const url=location.protocol+"//"+location.hostname+":"+v+"/";
  let tries=0;
  const poll=()=>{
    fetch(url,{mode:"no-cors"}).then(()=>{ location.href=url; })
      .catch(()=>{ if(++tries<40) setTimeout(poll,300); else location.href=url; });
  };
  setTimeout(poll,700);
}
function showAbout(){
  closeAbout();
  const ov=document.createElement("div"); ov.className="overlay"; ov.id="aboutOverlay";
  ov.innerHTML=`<div class="about">
    <i class="ti ti-x about-x" id="aboutCloseBtn" title="${t("aboutClose")}"></i>
    <div class="logo"><i class="ti ti-folder"></i></div>
    <h2>Zave</h2>
    <div class="ver">v${APP_VERSION}</div>
    <p>${t("aboutDesc")}</p>
    <div class="author"><i class="ti ti-user"></i>${t("aboutAuthor")} <a href="https://github.com/yurizhang" target="_blank" rel="noopener">Yong Zhang (@yurizhang)</a></div>
    <div class="author"><i class="ti ti-mail"></i><a href="mailto:zhangyong0604@126.com">zhangyong0604@126.com</a></div>
    <div class="links">
      <a class="btn gh" href="https://github.com/yurizhang/zave" target="_blank" rel="noopener"><i class="ti ti-brand-github"></i>${t("aboutGithub")}</a>
    </div>
    <div class="meta">${t("aboutBuilt")}</div>
  </div>`;
  ov.onclick=(e)=>{ if(e.target===ov) closeAbout(); };
  document.body.appendChild(ov);
  $("#aboutCloseBtn").onclick=closeAbout;
}
function closeAbout(){ const o=$("#aboutOverlay"); if(o) o.remove(); }
$("#menuBtn").onclick=(ev)=>{ ev.stopPropagation(); openAppMenu(ev); };

// keyboard shortcuts
document.addEventListener("keydown",e=>{
  if(e.key==="Escape"){ closeMenu(); closeAbout(); }
  if(e.target.tagName==="INPUT"){ if(e.key==="Escape"){ e.target.value=""; filterText=""; render(); e.target.blur(); } return; }
  const mod=e.metaKey||e.ctrlKey;
  if(mod&&e.key==="a"){ e.preventDefault(); selectAll(); }
  else if(mod&&e.key==="x"&&selSet.size){ e.preventDefault(); doCut(); }
  else if(mod&&e.key==="c"&&selSet.size){ e.preventDefault(); doCopy(); }
  else if(mod&&e.key==="v"&&clipboard){ e.preventDefault(); doPaste(); }
  else if(e.key==="F2"&&selSet.size===1){ e.preventDefault(); doRename(); }
  else if((e.key==="Delete"||e.key==="Backspace")&&selSet.size){ e.preventDefault(); doDelete(); }
  else if(e.key==="Enter"&&selSet.size===1){ const en=selEntry(); if(en&&en.kind==="directory") load(join(current,en.name)); }
  else if(!mod&&!e.altKey&&(e.key==="ArrowDown")){ e.preventDefault(); moveSel(1,e.shiftKey); }
  else if(!mod&&!e.altKey&&(e.key==="ArrowUp")){ e.preventDefault(); moveSel(-1,e.shiftKey); }
  else if(!mod&&(e.key==="Home")){ e.preventDefault(); moveSel("first"); }
  else if(!mod&&(e.key==="End")){ e.preventDefault(); moveSel("last"); }
});

// init
tabs=[{ current:"", hist:[], histIdx:-1, selName:null, entries:[], filterText:"" }];
active=0;
applyStatic();
// open the last-visited directory if we have one; fall back to home
(async ()=>{
  let last=""; try{ last=localStorage.getItem("fm-last-dir")||""; }catch{}
  if(!last || !(await load(last, false, true))) await load("");
})();
fetchNotice();   // check for announcements once, at startup
</script>
